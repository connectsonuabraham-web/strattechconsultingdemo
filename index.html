<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strattech Consulting</title>
 
  <!-- RETELL WIDGET — popup and auto-open both off, we handle everything -->
  <script
    id="retell-widget"
    src="https://dashboard.retellai.com/retell-widget.js"
    type="module"
    data-public-key="public_key_e9ce7af033bd2a9cd3f91"
    data-agent-id="agent_aa68003fa93eb734fcb6e26022"
    data-agent-version="0"
    data-title="Chat with Strattech"
    data-logo-url="https://i.pravatar.cc/150?img=47"
    data-color="#1e3a8a"
    data-bot-name="Sofia"
    data-popup-message=""
    data-show-ai-popup="false"
    data-auto-open="false"
  ></script>
 
  <style>
    /* Hide Retell's robot button visually but NOT with display:none or
       pointer-events:none — we need to programmatically .click() it.
       visibility:hidden keeps it in the DOM and clickable via JS.       */
    #retell-widget-button,
    .retell-widget-button,
    [data-retell-widget-button],
    div[class*="retell-widget-launcher"],
    div[class*="retellWidgetLauncher"],
    button[class*="retell-widget"],
    div[id*="retell-widget-container"] > button {
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
 
    /* Sofia floating button */
    #sofia-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #1e3a8a;
      border: 3px solid #ffffff;
      box-shadow: 0 4px 20px rgba(30,58,138,0.45);
      cursor: pointer;
      z-index: 2147483647;
      overflow: hidden;
      padding: 0;
      transition: transform 0.2s ease;
    }
    #sofia-btn:hover { transform: scale(1.08); }
    #sofia-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
 
    /* Popup bubble */
    #sofia-popup {
      position: fixed;
      bottom: 98px;
      right: 24px;
      background: #1a1f2e;
      color: #fff;
      border-radius: 14px 14px 4px 14px;
      padding: 13px 36px 13px 14px;
      z-index: 2147483646;
      min-width: 210px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: sofiaPopIn 0.4s ease both;
    }
    #sofia-popup.hidden { display: none !important; }
    #sofia-popup .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    #sofia-popup .pop-text .title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #sofia-popup .pop-text .sub {
      font-size: 12px;
      color: #60d9a0;
      margin-top: 3px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #sofia-popup .close-pop {
      position: absolute;
      top: 7px; right: 9px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 4px;
      line-height: 1;
    }
    #sofia-popup .close-pop:hover { color: #fff; }
    @keyframes sofiaPopIn {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
 
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
 
  <!-- Popup — visible immediately, hidden only after user clicks X -->
  <div id="sofia-popup">
    <button class="close-pop" onclick="sofiaClose()" aria-label="Close">✕</button>
    <div class="dot"></div>
    <div class="pop-text">
      <div class="title">Ask or book a call</div>
      <div class="sub">Sofia is ready to help</div>
    </div>
  </div>
 
  <!-- Sofia avatar button -->
  <button id="sofia-btn" onclick="sofiaOpen()" aria-label="Chat with Sofia">
    <img src="https://i.pravatar.cc/150?img=47" alt="Sofia" />
  </button>
 
  <script>
    /* If user already closed popup this session, keep it hidden */
    if (sessionStorage.getItem('sofiaDismissed')) {
      document.getElementById('sofia-popup').classList.add('hidden');
    }
 
    function sofiaClose() {
      document.getElementById('sofia-popup').classList.add('hidden');
      sessionStorage.setItem('sofiaDismissed', '1');
    }
 
    function sofiaOpen() {
      sofiaClose();
 
      /* Retell injects a button into the page. We find it, briefly
         restore visibility so the browser fires the click correctly,
         then hide it again. Retry every 200ms if widget still loading. */
      if (!triggerRetell()) {
        var attempts = 0;
        var poll = setInterval(function () {
          attempts++;
          if (triggerRetell() || attempts > 15) clearInterval(poll);
        }, 200);
      }
    }
 
    function triggerRetell() {
      var selectors = [
        '#retell-widget-button',
        '.retell-widget-button',
        '[data-retell-widget-button]',
        'button[class*="retell"]',
        'div[class*="retell"] button',
        'div[id*="retell"] button',
        'button[aria-label*="chat" i]',
        'button[aria-label*="retell" i]'
      ];
 
      for (var i = 0; i < selectors.length; i++) {
        var el = document.querySelector(selectors[i]);
        if (el) {
          /* Temporarily restore visibility + pointer-events */
          el.style.setProperty('visibility', 'visible', 'important');
          el.style.setProperty('opacity', '1', 'important');
          el.style.setProperty('pointer-events', 'auto', 'important');
 
          el.dispatchEvent(new MouseEvent('click', {
            bubbles: true, cancelable: true, view: window
          }));
 
          /* Re-hide after a tick */
          setTimeout(function (elem) {
            elem.style.setProperty('visibility', 'hidden', 'important');
            elem.style.setProperty('opacity', '0', 'important');
            elem.style.setProperty('pointer-events', 'none', 'important');
          }, 80, el);
 
          return true;
        }
      }
 
      /* Check shadow DOM (some Retell versions use it) */
      var divs = document.querySelectorAll('div');
      for (var j = 0; j < divs.length; j++) {
        if (divs[j].shadowRoot) {
          var inner = divs[j].shadowRoot.querySelector('button');
          if (inner) { inner.click(); return true; }
        }
      }
 
      return false;
    }
  </script>
</body>
</html>
