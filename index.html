<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strattech Consulting</title>
 
  <!-- ============================================================
       RETELL WIDGET SCRIPT
       - data-show-ai-popup="false"  → disables Retell's own popup
       - data-auto-open="false"      → we control open/close
       ============================================================ -->
  <script
    id="retell-widget"
    src="https://dashboard.retellai.com/retell-widget.js"
    type="module"
    data-public-key="public_key_e9ce7af033bd2a9cd3f91"
    data-agent-id="agent_aa68003fa93eb734fcb6e26022"
    data-agent-version="0"
    data-title="Chat with Strattech"
    data-logo-url="https://i.pravatar.cc/150?img=47"
    data-color="#1e3a8a"
    data-bot-name="Sofia"
    data-popup-message=""
    data-show-ai-popup="false"
    data-auto-open="false"
  ></script>
 
  <!-- ============================================================
       HIDE RETELL'S DEFAULT ROBOT BUTTON COMPLETELY
       We use !important and target every selector Retell may use
       so their button is invisible and can't interfere.
       ============================================================ -->
  <style>
    /* Hide Retell's native floating button — all known selectors */
    #retell-widget-button,
    .retell-widget-button,
    [data-retell-widget-button],
    div[class*="retell-widget-launcher"],
    div[class*="retellWidgetLauncher"],
    button[class*="retell-widget"],
    iframe[id*="retell-widget"],
    div[id*="retell-widget-container"] > button {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
 
    /* ── Custom Sofia Floating Button ── */
    #sofia-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #1e3a8a;
      border: 3px solid #ffffff;
      box-shadow: 0 4px 20px rgba(30, 58, 138, 0.45);
      cursor: pointer;
      z-index: 2147483647; /* maximum z-index */
      overflow: hidden;
      padding: 0;
      transition: transform 0.2s ease;
    }
    #sofia-btn:hover {
      transform: scale(1.08);
    }
    #sofia-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
 
    /* ── Custom Popup Bubble ── */
    #sofia-popup {
      position: fixed;
      bottom: 98px;
      right: 24px;
      background: #1a1f2e;
      color: #fff;
      border-radius: 14px 14px 4px 14px;
      padding: 13px 36px 13px 14px;
      z-index: 2147483646;
      min-width: 210px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: sofiaPopIn 0.3s ease both;
    }
    #sofia-popup.hidden {
      display: none;
    }
    #sofia-popup .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    #sofia-popup .pop-text .title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #sofia-popup .pop-text .sub {
      font-size: 12px;
      color: #60d9a0;
      margin-top: 3px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #sofia-popup .close-pop {
      position: absolute;
      top: 7px;
      right: 9px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }
    #sofia-popup .close-pop:hover {
      color: rgba(255, 255, 255, 0.9);
    }
    @keyframes sofiaPopIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
 
<body>
  <!-- Your site content renders here (React, HTML, etc.) -->
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
 
  <!-- ============================================================
       CUSTOM POPUP BUBBLE
       ============================================================ -->
  <div id="sofia-popup" class="hidden">
    <button class="close-pop" onclick="sofiaClose()" aria-label="Close">✕</button>
    <div class="dot"></div>
    <div class="pop-text">
      <div class="title">Ask or book a call</div>
      <div class="sub">Sofia is ready to help</div>
    </div>
  </div>
 
  <!-- ============================================================
       SOFIA AVATAR BUTTON
       Image: same URL used in data-logo-url above
       ============================================================ -->
  <button id="sofia-btn" onclick="sofiaOpen()" aria-label="Chat with Sofia">
    <img src="https://i.pravatar.cc/150?img=47" alt="Sofia - Strattech Assistant" />
  </button>
 
  <!-- ============================================================
       LOGIC
       ============================================================ -->
  <script>
    /* Show popup after 3 s (skip if already dismissed this session) */
    setTimeout(function () {
      if (!sessionStorage.getItem('sofiaDismissed')) {
        var p = document.getElementById('sofia-popup');
        if (p) p.classList.remove('hidden');
      }
    }, 3000);
 
    function sofiaClose() {
      var p = document.getElementById('sofia-popup');
      if (p) p.classList.add('hidden');
      sessionStorage.setItem('sofiaDismissed', '1');
    }
 
    function sofiaOpen() {
      sofiaClose();
 
      /*
        Find and click Retell's hidden button.
        Retell renders their button inside a shadow DOM or a fixed div.
        We try multiple selectors + a MutationObserver fallback.
      */
      var found = tryClickRetell();
      if (!found) {
        /* Widget JS may still be mounting — retry up to 10× over 2 s */
        var tries = 0;
        var interval = setInterval(function () {
          tries++;
          if (tryClickRetell() || tries >= 10) clearInterval(interval);
        }, 200);
      }
    }
 
    function tryClickRetell() {
      var selectors = [
        '#retell-widget-button',
        '.retell-widget-button',
        '[data-retell-widget-button]',
        'button[class*="retell"]',
        'div[class*="retell"] button',
        'div[id*="retell"] button'
      ];
      for (var i = 0; i < selectors.length; i++) {
        var el = document.querySelector(selectors[i]);
        if (el) {
          /* Temporarily make it clickable even though we hid it visually */
          el.style.pointerEvents = 'auto';
          el.click();
          el.style.pointerEvents = 'none';
          return true;
        }
      }
      return false;
    }
  </script>
</body>
</html>
